<!DOCTYPE html>
<!-- /home/smartgrow/web/templates/dashboard.html -->
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartGrow Mini</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--bg:#080f08;--bg2:#0d1a0d;--green:#00ff88;--blue:#44aaff;
      --purple:#cc44ff;--amber:#ffaa00;--red:#ff4444;--dim:#334433;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--green);font-family:monospace;min-height:100vh;}
header{padding:14px 20px;border-bottom:1px solid #0d2010;
       display:flex;justify-content:space-between;align-items:center;}
h1{font-size:1.2rem;letter-spacing:3px;text-shadow:0 0 16px var(--green);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);
     display:inline-block;margin-right:6px;animation:p 2s infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:.2}}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:12px;padding:16px;}
.card{background:var(--bg2);border:1px solid var(--dim);
      border-radius:8px;padding:16px;transition:.2s;}
.card:hover{border-color:var(--green);}
.lbl{font-size:.65rem;letter-spacing:2px;color:var(--dim);
     text-transform:uppercase;margin-bottom:6px;}
.val{font-size:2rem;font-weight:bold;}
.unit{font-size:.75rem;color:var(--dim);margin-left:2px;}
.soil .val{color:var(--green);}
.temp .val,.hum .val{color:var(--blue);}
.pump .val{color:var(--amber);}
.uv   .val{color:var(--purple);}
.bar-w{height:4px;background:#0d1a0d;border-radius:2px;margin-top:6px;}
.bar{height:100%;border-radius:2px;transition:width .5s;}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;
       font-size:.7rem;letter-spacing:1px;margin-top:6px;}
.on{background:rgba(0,255,136,.1);color:var(--green);border:1px solid var(--green);}
.off{background:rgba(51,68,51,.2);color:var(--dim);border:1px solid var(--dim);}
.sub{margin-top:4px;font-size:.65rem;color:var(--dim);}
.sec{padding:0 16px 16px;}
.box{background:var(--bg2);border:1px solid var(--dim);border-radius:8px;padding:16px;}
.box h3{font-size:.65rem;letter-spacing:2px;color:var(--dim);
        text-transform:uppercase;margin-bottom:12px;}
.ev-list{max-height:160px;overflow-y:auto;}
.ev{font-size:.72rem;padding:4px 0;border-bottom:1px solid #0d1a0d;color:#556655;}
.ev .t{color:var(--dim);margin-right:8px;}
.ev.pump{color:var(--amber)}.ev.uv{color:var(--purple)}.ev.alert{color:var(--red)}
footer{text-align:center;padding:12px;color:var(--dim);font-size:.65rem;
       border-top:1px solid #0d2010;}
</style>
</head>
<body>
<header>
  <h1>SmartGrow Mini</h1>
  <span><span class="dot"></span><span id="clk"></span></span>
</header>

<div class="grid">
  <div class="card soil">
    <div class="lbl">Грунт 1</div>
    <div><span class="val" id="s1">0</span><span class="unit">%</span></div>
    <div class="bar-w"><div class="bar" id="b1" style="background:var(--green);width:0"></div></div>
  </div>
  <div class="card soil">
    <div class="lbl">Грунт 2</div>
    <div><span class="val" id="s2">0</span><span class="unit">%</span></div>
    <div class="bar-w"><div class="bar" id="b2" style="background:var(--green);width:0"></div></div>
  </div>
  <div class="card temp">
    <div class="lbl">Температура</div>
    <div><span class="val" id="temp">0</span><span class="unit">°C</span></div>
  </div>
  <div class="card hum">
    <div class="lbl">Вологість повітря</div>
    <div><span class="val" id="hum">0</span><span class="unit">%</span></div>
  </div>
  <div class="card pump">
    <div class="lbl">Насос</div>
    <div class="val" id="pval">OFF</div>
    <div id="pbadge"><span class="badge off">зупинено</span></div>
    <div class="sub">Полив: <span id="lw">—</span></div>
  </div>
  <div class="card uv">
    <div class="lbl">UV LED</div>
    <div class="val" id="uval">OFF</div>
    <div id="ubadge"><span class="badge off">вимкнено</span></div>
  </div>
</div>

<div class="sec">
  <div class="box">
    <h3>Вологість грунту — остання година</h3>
    <canvas id="chart" height="70"></canvas>
  </div>
</div>

<div class="sec">
  <div class="box">
    <h3>Останні події</h3>
    <div class="ev-list" id="evs"></div>
  </div>
</div>

<footer>SmartGrow Mini | Infomatrix Ukraine 2026 | RPi 4B + DietPi</footer>

<script>
const socket = io();
const chart  = new Chart(document.getElementById("chart").getContext("2d"), {
  type:"line",
  data:{
    labels:[],
    datasets:[
      {label:"Грунт 1",data:[],borderColor:"#00ff88",
       backgroundColor:"rgba(0,255,136,.04)",tension:.4,pointRadius:2,borderWidth:2},
      {label:"Грунт 2",data:[],borderColor:"#44aaff",
       backgroundColor:"rgba(68,170,255,.04)",tension:.4,pointRadius:2,borderWidth:2}
    ]
  },
  options:{
    responsive:true,animation:{duration:150},
    plugins:{legend:{labels:{color:"#00ff88",font:{size:11}}}},
    scales:{
      x:{ticks:{color:"#334433",font:{size:10}},grid:{color:"#0d1a0d"}},
      y:{min:0,max:100,ticks:{color:"#334433",font:{size:10}},grid:{color:"#0d1a0d"}}
    }
  }
});

setInterval(()=>{
  document.getElementById("clk").textContent=new Date().toLocaleTimeString("uk");
},1000);

socket.on("update",d=>{
  if(!d||!Object.keys(d).length)return;
  const s1=d.soil1||0,s2=d.soil2||0;
  document.getElementById("s1").textContent  =s1;
  document.getElementById("s2").textContent  =s2;
  document.getElementById("temp").textContent=d.temp||0;
  document.getElementById("hum").textContent =d.hum_air||0;
  document.getElementById("b1").style.width  =s1+"%";
  document.getElementById("b2").style.width  =s2+"%";
  document.getElementById("lw").textContent  =d.last_water||"—";
  const pon=!!d.pump,uon=!!d.uv;
  document.getElementById("pval").textContent=pon?"ON":"OFF";
  document.getElementById("uval").textContent=uon?"ON":"OFF";
  document.getElementById("pbadge").innerHTML=
    `<span class="badge ${pon?"on":"off"}">${pon?"активний":"зупинено"}</span>`;
  document.getElementById("ubadge").innerHTML=
    `<span class="badge ${uon?"on":"off"}">${uon?"активна":"вимкнена"}</span>`;
  const t=new Date().toLocaleTimeString("uk",
    {hour:"2-digit",minute:"2-digit",second:"2-digit"});
  if(chart.data.labels.length>40){
    chart.data.labels.shift();
    chart.data.datasets.forEach(ds=>ds.data.shift());
  }
  chart.data.labels.push(t);
  chart.data.datasets[0].data.push(s1);
  chart.data.datasets[1].data.push(s2);
  chart.update("none");
});

socket.on("events",evs=>{
  const cls=t=>t.includes("PUMP")?"pump":t.includes("UV")?"uv":
              t.includes("ALERT")?"alert":"";
  document.getElementById("evs").innerHTML=(evs||[]).map(e=>
    `<div class="ev ${cls(e.event_type||"")}">` +
    `<span class="t">${(e.timestamp||"").slice(11,16)}</span>` +
    `${e.message||""}</div>`
  ).join("");
});
</script>
</body>
</html>
