# /home/smartgrow/deploy/nginx.conf
# Nginx конфіг — проксі на Flask порт 5000
#
# Встановлення:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/smartgrow
#   sudo ln -sf /etc/nginx/sites-available/smartgrow /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl restart nginx

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400;
    }
}
